<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base href="/">
  <title>Pipeline Visualizer - Tests</title>
  <script type="importmap">
    { "imports": { "ajv": "/build/vendor/ajv.js", "ajv/dist/2020": "/build/vendor/ajv-2020.js" } }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 20px;
      background: #fafafa;
    }
    h1 { margin-bottom: 16px; color: #212121; }
    h2 {
      margin-bottom: 12px;
      padding: 12px 16px;
      border-radius: 6px;
    }
    h2.pass { background: #e8f5e9; color: #2e7d32; }
    h2.fail { background: #ffebee; color: #c62828; }
    .suite {
      margin-bottom: 16px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      overflow: hidden;
    }
    .suite h3 {
      padding: 10px 16px;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      font-size: 14px;
      color: #424242;
    }
    .test {
      padding: 6px 16px;
      font-size: 13px;
      border-bottom: 1px solid #f5f5f5;
    }
    .test:last-child { border-bottom: none; }
    .test.pass { color: #2e7d32; }
    .test.fail { color: #c62828; font-weight: 500; }
    .error {
      margin-top: 4px;
      padding: 6px 10px;
      background: #fff3e0;
      border-radius: 4px;
      font-size: 12px;
      color: #e65100;
      font-family: 'SF Mono', monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }
    #loading {
      padding: 20px;
      color: #757575;
      font-style: italic;
    }
  </style>
</head>
<body>
  <h1>Pipeline Visualizer Tests</h1>
  <div id="loading">Running tests...</div>
  <div id="test-results"></div>

  <script type="module">
    import { renderResults } from '/build/tests/test-runner.js';
    import { runDagBuilderTests } from '/build/tests/test-dag-builder.js';
    import { runLayoutTests } from '/build/tests/test-layout.js';
    import { runHitTestingTests } from '/build/tests/test-hit-testing.js';
    import { runInteractionTests } from '/build/tests/test-interaction.js';
    import { runEventCorrelationTests } from '/build/tests/test-event-correlation.js';
    import { runEventStreamingTests } from '/build/tests/test-event-streaming.js';
    import { runDetailPanelTests } from '/build/tests/test-detail-panel.js';

    async function runAll() {
      try {
        await runDagBuilderTests();
        await runLayoutTests();
        await runHitTestingTests();
        await runInteractionTests();
        await runEventCorrelationTests();
        await runEventStreamingTests();
        await runDetailPanelTests();
      } catch (e) {
        console.error('Test suite error:', e);
        document.getElementById('loading').textContent =
          'Error loading tests: ' + e.message;
        return;
      }

      document.getElementById('loading').style.display = 'none';
      const { pass, fail } = renderResults();

      // Style the header
      const h2 = document.querySelector('#test-results h2');
      if (h2) {
        h2.className = fail > 0 ? 'fail' : 'pass';
      }
    }

    runAll();
  </script>
</body>
</html>
